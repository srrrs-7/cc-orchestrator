server {
    listen 80;
    server_name _;

    # Hide the nginx version from response headers / default error pages.
    server_tokens off;

    # Baseline security headers for all responses.
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache hashed static assets aggressively; index.html stays revalidated.
    # Vite emits content-hashed filenames (e.g. assets/index-XXXX.js), so a
    # 1 year max-age + immutable is safe: a new build always gets a new URL.
    # add_header in this location overrides (does not merge with) the
    # server-level add_header directives above, so the security headers are
    # repeated here to keep them present on these responses too.
    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }

    # Reverse proxy to the auth service. /auth/* -> http://auth:8080/*.
    # Same pattern as /api/: variable upstream for lazy DNS resolution,
    # explicit rewrite to strip the /auth prefix.
    location /auth/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $auth_upstream http://auth:8080;
        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass $auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy to the api service. /api/tasks -> http://api:8080/tasks.
    #
    # The upstream is resolved via a variable + Docker's embedded DNS
    # (127.0.0.11) at request time instead of at config load, so nginx still
    # starts (serving static assets / SPA) even if the "api" service is not
    # yet resolvable. However, nginx does NOT apply the usual location-prefix
    # auto-strip (trailing slash on proxy_pass) when proxy_pass's target is a
    # variable, so the /api prefix must be stripped explicitly with rewrite
    # before proxying (query strings are preserved by rewrite by default).
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8080;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: unmatched routes serve index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
