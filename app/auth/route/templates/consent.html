<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Authorize application</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; min-height: 100dvh; display: grid; place-items: center; background: #f4f4f5; color: #18181b; }
    @media (prefers-color-scheme: dark) {
      body { background: #09090b; color: #fafafa; }
      .card { background: #18181b; border-color: #27272a; }
    }
    .card { width: min(100% - 2rem, 28rem); padding: 1.5rem; border: 1px solid #e4e4e7; border-radius: 0.75rem; background: #fff; box-shadow: 0 1px 2px rgb(0 0 0 / 0.05); }
    h1 { margin: 0 0 0.5rem; font-size: 1.25rem; }
    p { margin: 0 0 1rem; color: #71717a; font-size: 0.875rem; line-height: 1.5; }
    ul { margin: 0 0 1.25rem; padding-left: 1.25rem; }
    li { margin-bottom: 0.375rem; }
    .actions { display: grid; gap: 0.75rem; grid-template-columns: 1fr 1fr; }
    button, .btn { display: inline-block; text-align: center; padding: 0.625rem 0.75rem; border-radius: 0.5rem; font: inherit; cursor: pointer; text-decoration: none; border: 0; }
    .accept { background: #18181b; color: #fafafa; }
    .deny { background: transparent; color: inherit; border: 1px solid #d4d4d8; }
    @media (prefers-color-scheme: dark) {
      .accept { background: #fafafa; color: #18181b; }
      .deny { border-color: #3f3f46; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Authorize {{.ClientID}}</h1>
    <p>Signed in as <strong>{{.Username}}</strong>. This application is requesting access to:</p>
    <ul>
      {{range .Scopes}}
      <li>{{.}}</li>
      {{end}}
    </ul>
    <form method="post" action="" class="actions">
      <button type="submit" name="action" value="accept" class="accept">Allow</button>
      <button type="submit" name="action" value="deny" class="deny">Deny</button>
    </form>
  </main>
</body>
</html>
