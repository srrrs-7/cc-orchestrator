services:
  # SPEC-005 (2026-07-09 refactor, plan §RF.1.1): single local Postgres
  # instance backing both app/api and app/auth, each in its own
  # dedicated database ("api" / "auth") rather than a shared database
  # split by schema/search_path. app/migrator (run via the root
  # Makefile's `migrate` target, a prerequisite of `up`/`up-d` below)
  # creates each database (if missing) and applies that stack's
  # db/migrations against it -- there is no compose init script step
  # for this anymore (schema/database bootstrap moved from
  # docker-entrypoint-initdb.d into app/migrator so local/CI/prod share
  # one creation path). POSTGRES_DB below is only the Postgres image's
  # own default/maintenance database (app/migrator's DB_MAINTENANCE_NAME
  # defaults to "postgres", which the image also always creates, so
  # POSTGRES_DB's value here does not need to match it). The credentials
  # below are fixed, non-secret local-only defaults (they also match
  # app/api/Makefile and app/auth/Makefile's DB_* defaults) -- never
  # reused for any real environment.
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped

  api:
    build:
      context: ./app/api
    image: cc-orchestrator/api:local
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: api
      DB_USER: app
      DB_PASSWORD: app
      DB_SSLMODE: disable
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  auth:
    build:
      context: ./app/auth
    image: cc-orchestrator/auth:local
    ports:
      - "127.0.0.1:8082:8080"
    environment:
      ISSUER: http://localhost:8082
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: auth
      DB_USER: app
      DB_PASSWORD: app
      DB_SSLMODE: disable
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./app/web
    image: cc-orchestrator/web:local
    ports:
      - "127.0.0.1:8080:80"
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
