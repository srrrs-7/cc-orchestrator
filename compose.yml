services:
  api:
    build:
      context: ./app/api
    image: cc-orchestrator/api:local
    ports:
      - "127.0.0.1:8081:8080"
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped

  auth:
    build:
      context: ./app/auth
    image: cc-orchestrator/auth:local
    ports:
      - "127.0.0.1:8082:8080"
    environment:
      ISSUER: http://localhost:8082
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped

  web:
    build:
      context: ./app/web
    image: cc-orchestrator/web:local
    ports:
      - "127.0.0.1:8080:80"
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
