# Manual AWS deploy for the cc-orchestrator sample apps (SPEC-004).
#
# This workflow is the CI/CD-tooling equivalent of the root Makefile's
# `push-images` / `deploy-web` targets: it builds api/auth as ARM64 images
# and pushes them to ECR, and builds app/web and syncs it to S3 + invalidates
# CloudFront. It is intentionally NOT wired to any automatic trigger (no
# push/pull_request) — it only runs via manual `workflow_dispatch`, and never
# runs `terraform apply` (see .claude/rules/iac.md). It assumes
# app/iac/envs/dev has already been applied by a human and that the ECR
# repos / S3 bucket / CloudFront distribution referenced below already exist.
#
# Kept separate from .github/workflows/cicd.yml (CI only, no AWS access, no
# deploy steps) so CI never needs deploy credentials.
#
# ECR repository URLs / S3 bucket name / CloudFront distribution id are read
# from `terraform output` in app/iac/envs/dev rather than duplicated here —
# the output names below (api_ecr_repository_url / auth_ecr_repository_url /
# web_bucket_name / cloudfront_distribution_id) are the contract defined by
# app/iac/envs/dev/outputs.tf (SPEC-004 plan).
#
# ARM64 is explicit on every image build (docker/setup-qemu-action +
# `platforms: linux/arm64`) so this can never silently produce an amd64
# image that fails to start on the ECS ARM64 task definition (ISSUE-014).
#
# SPEC-009 review fix (Major-1, 2026-07-10): `deploy-web` used to run
# `oven-sh/setup-bun` + `bun install --frozen-lockfile` + `bun run build` in
# the SAME job as `aws-actions/configure-aws-credentials` (OIDC AssumeRole)
# — i.e. arbitrary third-party JS dependencies were installed/executed while
# this job held live production deploy-role credentials in its environment,
# exactly the Shai-Hulud-style supply-chain exposure SPEC-009 exists to
# close. Fixed by splitting the web build into its own `build-web` job that
# never requests `id-token: write` and never runs `configure-aws-credentials`
# (structurally cannot mint an AWS OIDC token even if a compromised
# dependency tried — that permission is job-scoped, not just "unused"), and
# runs `bun install`/`bun run build` through the same pinned, secret-free
# toolchain container (`./.github/actions/build-toolchain-image` +
# `bin/bun`, SPEC-009 Phase B/C) every other workflow already uses instead of
# a runner-installed bun. `app/web/dist` is handed to the AWS-credentialed
# `deploy-web` job only as an `actions/upload-artifact`/`download-artifact`
# build artifact — never as a job that has both live AWS credentials and a
# third-party dependency-install step at the same time. This is the "build =
# container / aws = host" split SPEC-009 R7 already established for the
# root Makefile's own `deploy-web` target (see that target's own comment);
# this workflow now mirrors it with an actual job boundary rather than just
# step ordering, since job boundaries are what make the missing
# `id-token: write` permission enforceable rather than just conventional.
#
# `push-images` did NOT have this exposure (its only "build" is
# `docker buildx build` of this repo's own trusted app/api / app/auth
# Dockerfiles — no third-party npm/go dependency install happens anywhere in
# that job), so it keeps `configure-aws-credentials` as its first step. Its
# `hashicorp/setup-terraform@v3` step is swapped for the shared
# `./.github/actions/build-toolchain-image` action instead (terraform is
# already baked into that image, pinned via versions.env, R6) purely for
# single-toolchain consistency with every other workflow — not a Major-1-
# style fix, since terraform reading this repo's own already-applied
# `app/iac/envs/dev` state was never the risk (see versions.env: this
# workflow's previous TERRAFORM_VERSION pin already matched versions.env's,
# no drift). The terraform commands themselves now run inside the toolchain
# image's network-enabled `tools` service with AWS credentials forwarded by
# bare env-var name (`-e AWS_ACCESS_KEY_ID` etc., Docker reads these from the
# step's own process environment — never written to the image or a file);
# this is not a new pattern introduced here, it is exactly
# app/iac/Makefile's own already-established `ONLINE_AWS`/
# `AWS_ENV_PASSTHROUGH` convention for its `init`(real backend)/`plan`/
# `apply` targets (SPEC-009 Phase B), reused verbatim.
#
# `oven-sh/setup-bun@v2` also independently pinned bun 1.2.21 here, one of
# three bun version pins that had drifted apart across this repo pre-
# SPEC-009 (cicd.yml pinned 1.2.21, contract-drift.yml pinned 1.3.14 "on
# purpose", app/web/Dockerfile floats `oven/bun:1`) — removing it in favor of
# the shared toolchain image (versions.env's single BUN_VERSION=1.3.14) also
# closes that drift for this file (R1).
name: Deploy (manual)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "api/auth コンテナイメージの ECR タグ"
        required: false
        default: "latest"
      deploy_images:
        description: "api/auth イメージを ARM64 で build & ECR push する"
        type: boolean
        required: false
        default: true
      deploy_web:
        description: "web を build して S3 sync + CloudFront invalidation する"
        type: boolean
        required: false
        default: true

# Manual deploys should not be auto-cancelled by a newer dispatch of the same
# workflow while one is in flight (unlike cicd.yml's PR/push concurrency
# group, which cancels superseded runs).
concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-1
  TF_ENV_DIR: app/iac/envs/dev
  # Bare env-var names Docker reads from this step's own process
  # environment and forwards into the toolchain container — never written
  # to the image, a file, or the compose.tools.yml definition itself (that
  # file deliberately mounts no host secrets). Matches
  # app/iac/Makefile's own AWS_ENV_PASSTHROUGH list exactly (SPEC-009 Phase
  # B), reused here for the same "real backend + AWS provider" terraform
  # calls.
  AWS_ENV_PASSTHROUGH: -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_SESSION_TOKEN -e AWS_REGION -e AWS_DEFAULT_REGION

jobs:
  # ---------------------------------------------------------------------------
  # web — build ONLY (SPEC-009 Major-1 fix). Deliberately requests no
  # `id-token: write` and runs no `configure-aws-credentials` step, so this
  # job never holds AWS deploy-role credentials while `bun install`/
  # `bun run build` executes third-party dependencies — the OIDC AssumeRole
  # permission is job-scoped in GitHub Actions, so omitting it here makes
  # "this job cannot mint an AWS credential" structurally true, not just a
  # matter of step ordering. Build runs through the same pinned, secret-free
  # toolchain container (SPEC-009 Phase B/C: `./.github/actions/
  # build-toolchain-image` + `bin/bun`) every other workflow already uses,
  # identical in shape to cicd.yml's own `web` job (minus format/lint/
  # typecheck/test, already covered by cicd.yml on every push to main; a
  # deploy dispatch only needs a fresh production build).
  # ---------------------------------------------------------------------------
  build-web:
    name: Build web (toolchain container, no AWS credentials)
    if: ${{ inputs.deploy_web }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/build-toolchain-image

      # bin/bun (SPEC-009 Phase B) is a POSIX-sh shim that dispatches
      # `bun ...` into the toolchain image; putting it at the FRONT of PATH
      # is this job's only toolchain-specific setup.
      - name: Add repo bin/ (bun shim) to PATH
        shell: bash
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      # --frozen-lockfile installs exactly what bun.lock pins (see
      # cicd.yml's own web job). `install` is one of bin/bun's
      # network-needing subcommands (routes to the toolbox's
      # network-enabled `tools` service); `build` below is offline
      # (`tools-offline`, network_mode: none).
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Contract: .claude/rules/web.md (`bun run build` = tsc --noEmit && vite build).
      - name: Build
        run: bun run build

      - name: Upload dist/ artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: app/web/dist
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # api/auth — ARM64 build & push to ECR (root Makefile `push-images` in CI form).
  # ---------------------------------------------------------------------------
  push-images:
    name: Build & push api/auth images (ARM64)
    if: ${{ inputs.deploy_images }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write # required for aws-actions/configure-aws-credentials OIDC AssumeRole
      contents: read
    steps:
      - uses: actions/checkout@v7

      # OIDC AssumeRole — no long-lived AWS credentials stored in the repo.
      # secrets.AWS_DEPLOY_ROLE_ARN must be configured as a repository/
      # environment secret; the role ARN (and the AWS account id it embeds)
      # is never written in this file.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # SPEC-009: shared toolchain image (terraform pinned via versions.env)
      # instead of hashicorp/setup-terraform@v3 — see file header for why
      # this is a consistency change, not a Major-1-style fix (this job's
      # only actual "build", docker buildx of this repo's own trusted
      # app/api / app/auth Dockerfiles further below, never had a
      # third-party dependency-install step running alongside live AWS
      # credentials).
      - uses: ./.github/actions/build-toolchain-image

      # Real backend (not init-local): app/iac/envs/dev is assumed already
      # applied, and the deploy role is assumed to have read access to the
      # terraform state backend. Runs inside the toolchain image's
      # network-enabled `tools` service (needs to reach the S3 backend);
      # AWS credentials are forwarded by bare env-var name only (see
      # AWS_ENV_PASSTHROUGH above) — this is app/iac/Makefile's own
      # `ONLINE_AWS` convention (SPEC-009 Phase B), reused verbatim rather
      # than invented here.
      - name: terraform init (real backend)
        run: |
          TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g) \
          docker compose --env-file "$GITHUB_WORKSPACE/versions.env" -f "$GITHUB_WORKSPACE/compose.tools.yml" \
            run --rm -w "/workspace/${{ env.TF_ENV_DIR }}" ${{ env.AWS_ENV_PASSTHROUGH }} \
            tools terraform init

      - name: Resolve ECR repository URLs
        id: tf
        run: |
          export TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g)
          api_repo=$(docker compose --env-file "$GITHUB_WORKSPACE/versions.env" -f "$GITHUB_WORKSPACE/compose.tools.yml" \
            run --rm -w "/workspace/${{ env.TF_ENV_DIR }}" ${{ env.AWS_ENV_PASSTHROUGH }} \
            tools terraform output -raw api_ecr_repository_url)
          auth_repo=$(docker compose --env-file "$GITHUB_WORKSPACE/versions.env" -f "$GITHUB_WORKSPACE/compose.tools.yml" \
            run --rm -w "/workspace/${{ env.TF_ENV_DIR }}" ${{ env.AWS_ENV_PASSTHROUGH }} \
            tools terraform output -raw auth_ecr_repository_url)
          echo "api_repo=$api_repo" >> "$GITHUB_OUTPUT"
          echo "auth_repo=$auth_repo" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        run: |
          registry="$(echo "${{ steps.tf.outputs.api_repo }}" | cut -d/ -f1)"
          aws ecr get-login-password --region "${{ env.AWS_REGION }}" | docker login --username AWS --password-stdin "$registry"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      # NOTE: ubuntu-latest runners are amd64, so linux/arm64 is built under
      # QEMU emulation here (slower than native). See SPEC-004 plan risks —
      # an arm64-native runner (e.g. self-hosted / GitHub larger runner) is
      # the recommended upgrade path if this workflow sees regular use.
      - name: Build & push api image (linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: app/api
          platforms: linux/arm64
          push: true
          tags: ${{ steps.tf.outputs.api_repo }}:${{ inputs.image_tag }}

      - name: Build & push auth image (linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: app/auth
          platforms: linux/arm64
          push: true
          tags: ${{ steps.tf.outputs.auth_repo }}:${{ inputs.image_tag }}

  # ---------------------------------------------------------------------------
  # web — sync the artifact build-web already produced to S3 + CloudFront
  # invalidation (root Makefile `deploy-web` in CI form). SPEC-009 Major-1
  # fix: this is the ONLY job in this workflow that holds AWS deploy-role
  # credentials for the web deploy path, and it never installs or runs any
  # third-party JS dependency — `app/web/dist` arrives as a prebuilt
  # artifact from build-web, which ran with no AWS credentials at all (see
  # that job's own comment). `needs: build-web` also means this job is
  # skipped whenever build-web is skipped/fails (GitHub Actions' default
  # "needs must succeed" behavior applies unless a job's own `if:` uses
  # `always()`/`success()`, which this one does not), so a `deploy_web: false`
  # dispatch skips both jobs together exactly as before.
  # ---------------------------------------------------------------------------
  deploy-web:
    name: Sync web to S3 + CloudFront invalidation
    needs: build-web
    if: ${{ inputs.deploy_web }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write # required for aws-actions/configure-aws-credentials OIDC AssumeRole
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Download dist/ artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: app/web/dist

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # SPEC-009: shared toolchain image instead of hashicorp/setup-terraform@v3
      # — see push-images' identical step for rationale. This job never runs
      # `bun`/JS tooling of any kind (build-web already produced dist/), so
      # the only thing this action's image is used for here is `terraform`.
      - uses: ./.github/actions/build-toolchain-image

      - name: terraform init (real backend)
        run: |
          TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g) \
          docker compose --env-file "$GITHUB_WORKSPACE/versions.env" -f "$GITHUB_WORKSPACE/compose.tools.yml" \
            run --rm -w "/workspace/${{ env.TF_ENV_DIR }}" ${{ env.AWS_ENV_PASSTHROUGH }} \
            tools terraform init

      - name: Resolve web bucket / distribution id
        id: tf
        run: |
          export TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g)
          bucket=$(docker compose --env-file "$GITHUB_WORKSPACE/versions.env" -f "$GITHUB_WORKSPACE/compose.tools.yml" \
            run --rm -w "/workspace/${{ env.TF_ENV_DIR }}" ${{ env.AWS_ENV_PASSTHROUGH }} \
            tools terraform output -raw web_bucket_name)
          distribution_id=$(docker compose --env-file "$GITHUB_WORKSPACE/versions.env" -f "$GITHUB_WORKSPACE/compose.tools.yml" \
            run --rm -w "/workspace/${{ env.TF_ENV_DIR }}" ${{ env.AWS_ENV_PASSTHROUGH }} \
            tools terraform output -raw cloudfront_distribution_id)
          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$distribution_id" >> "$GITHUB_OUTPUT"

      - name: Sync dist/ to S3
        run: aws s3 sync app/web/dist "s3://${{ steps.tf.outputs.bucket }}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.tf.outputs.distribution_id }}" --paths '/*'
