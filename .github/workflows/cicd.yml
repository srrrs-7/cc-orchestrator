# CI pipeline for the cc-orchestrator monorepo.
#
# This workflow runs CI only (format / lint / type check / test / build per
# stack). It intentionally contains NO deploy / CD steps and never runs
# `terraform apply` (see .claude/rules/iac.md).
#
# The commands each job runs are the contract defined in
# .claude/rules/{web,api,auth,iac,testing,db}.md — do not invent commands
# here. Monorepo strategy: a `changes` job detects which stacks changed, and
# each stack job runs only when its paths changed (or on manual dispatch),
# keeping stacks independent.
#
# app/migrator (SPEC-005 2026-07-09 refactor, plan §RF.3 RC2) is its own Go
# module with its own `migrator` job (make check), and is also the tool the
# api-integration / auth-integration jobs below invoke to create each
# stack's dedicated Postgres database and apply its migrations — see those
# jobs' comments for why plain unit-test jobs (`api`/`auth`, memory-backed)
# do not need to know about it. migrator-integration additionally exercises
# app/migrator's own least-privilege runtime role provisioning (ISSUE-016
# R-c) against a real Postgres instance.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs for the same ref (e.g. new push to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Pinned tool / runtime versions (single source of truth for the whole file).
# Action refs are pinned inline and kept fresh by Dependabot (github-actions);
# the tool binary versions below are managed here manually.
env:
  GO_VERSION: "1.24"
  BUN_VERSION: "1.2.21"
  TERRAFORM_VERSION: "1.10.5"
  GOLANGCI_LINT_VERSION: "2.12.2"
  TFLINT_VERSION: "v0.55.1"
  TRIVY_VERSION: "v0.58.1"
  # SPEC-005 Postgres service container image for the api-integration /
  # auth-integration jobs below. Pinned (not `postgres:17` / `latest`) and
  # kept in sync with compose.yml's local-dev postgres service (impl-db) so
  # CI and local `make up`/`make migrate` exercise the same server version.
  POSTGRES_VERSION: "17.5-alpine"

jobs:
  # ---------------------------------------------------------------------------
  # Detect which stacks changed so each stack job can be skipped when untouched.
  # The workflow file itself is added to every filter so CI changes re-run all.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed stacks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      auth: ${{ steps.filter.outputs.auth }}
      iac: ${{ steps.filter.outputs.iac }}
      migrator: ${{ steps.filter.outputs.migrator }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'app/web/**'
              - '.github/workflows/cicd.yml'
            api:
              - 'app/api/**'
              - '.github/workflows/cicd.yml'
            auth:
              - 'app/auth/**'
              - '.github/workflows/cicd.yml'
            iac:
              - 'app/iac/**'
              - '.github/workflows/cicd.yml'
            migrator:
              - 'app/migrator/**'
              - '.github/workflows/cicd.yml'

  # ---------------------------------------------------------------------------
  # web (TypeScript / React) — Bun runtime/pm, Biome, tsc, Vitest, Vite.
  # Contract: .claude/rules/web.md (package.json scripts).
  # ---------------------------------------------------------------------------
  web:
    name: web (TypeScript / React)
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      # --frozen-lockfile installs exactly what bun.lock pins; the
      # bunfig.toml minimumReleaseAge gate only affects resolving new versions,
      # so locked deps are unaffected in CI.
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Format check
        run: bun run format:check
      - name: Lint
        run: bun run lint
      - name: Type check
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build

  # ---------------------------------------------------------------------------
  # app/migrator (Go) — SPEC-005's shared migration runner (2026-07-09
  # refactor, plan §RF.2.1/§RF.3 RC2). Independent module (its own go.mod),
  # so it gets its own `make check` lane rather than piggybacking on api/auth.
  # `make check` = fmt-check + lint + vet + build + test (app/migrator/Makefile,
  # same target shape as api/auth). golangci-lint is not preinstalled on the
  # runner, so CI installs it (pinned) before invoking `make check`.
  # Contract: .claude/rules/db.md (RF-h: app/migrator is impl-db's).
  # ---------------------------------------------------------------------------
  migrator:
    name: migrator (Go)
    needs: changes
    if: ${{ needs.changes.outputs.migrator == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/migrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # Unlike app/api and app/auth (pgx-only, `go run pkg@version` CLI
          # tools), this module's go.mod requires goose as a library
          # dependency (plan §RF.1.2 "goose の閉じ込め"), hence its own
          # go.sum / cache key.
          cache: true
          cache-dependency-path: app/migrator/go.sum
      - name: Install golangci-lint
        run: |
          curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/v${GOLANGCI_LINT_VERSION}/install.sh" \
            | sh -s -- -b "$(go env GOPATH)/bin" "v${GOLANGCI_LINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Check (fmt-check + lint + vet + build + test)
        run: make check

  # ---------------------------------------------------------------------------
  # migrator (Go) — Postgres permission-boundary integration tests (ISSUE-016
  # R-c, review-security Major-1). Spins up its own pinned postgres service
  # container (same image/health check as api-integration/auth-integration
  # below), then runs this module's own binary against it with
  # APP_DB_USER/APP_DB_PASSWORD set so the "up" migration also provisions the
  # least-privilege runtime role (infra/postgres.RoleEnsurer, plan
  # ISSUE-016-plan.md §1.1's api_app/auth_app convention) -- the precondition
  # the "integration"-tagged permission-boundary test suite (app/migrator,
  # impl-db) asserts against: the scoped role can do DML on its own database,
  # cannot do DDL, and cannot CONNECT to another database.
  #
  # Deliberately separate from api-integration/auth-integration below (rather
  # than folding a step into one of them): those two jobs exercise app/api's
  # and app/auth's own infra/postgres against a migrated database; this job
  # is about migrator's *own* role-provisioning behavior, which is this
  # module's test suite (`app/migrator/...`, not app/api's or app/auth's), so
  # it gets its own throwaway postgres service container and does not touch
  # the two existing jobs. It reuses the "api" target/database purely as a
  # fixture to get a real migrated database to provision a role against; it
  # is not testing app/api's persistence layer.
  #
  # Contract: .claude/rules/db.md (ISSUE-016 R-c) + app/migrator's CLI
  # (`-target`/`-command`/`-migrations-dir`, see app/migrator/cmd/migrator/
  # main.go) + env.go's APP_DB_USER/APP_DB_PASSWORD contract -- nothing here
  # invents a different command or environment variable.
  # ---------------------------------------------------------------------------
  migrator-integration:
    name: migrator (Postgres permission boundary integration)
    needs: changes
    if: ${{ needs.changes.outputs.migrator == 'true' || needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/migrator
    services:
      postgres:
        # `services.<id>.image` cannot reference the `env` context (see
        # api-integration below for the same note) -- keep this literal in
        # sync with env.POSTGRES_VERSION above.
        image: postgres:17.5-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          # Disposable credential for this job's ephemeral, throwaway
          # service container only -- see api-integration below for the
          # same rationale (never leaves this CI run, unrelated to any
          # real environment/secret).
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Master connection settings, matching api-integration's own DB_*
      # values below (this job reuses the "api" target as a fixture, see
      # this job's header comment). DB_MAINTENANCE_NAME is left unset so
      # app/migrator falls back to its own default ("postgres"), same as
      # api-integration/auth-integration.
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_NAME: api
      DB_USER: app
      DB_PASSWORD: app
      DB_SSLMODE: disable
      # Names the least-privilege runtime role (ISSUE-016 R-c naming
      # convention, app/iac/modules/db/variables.tf's api_app_role_name
      # default) this job's "up" migration provisions via
      # infra/postgres.RoleEnsurer -- the role the permission-boundary
      # test suite below connects as. Disposable, job-scoped value only
      # (see POSTGRES_PASSWORD above), not a real secret.
      APP_DB_USER: api_app
      APP_DB_PASSWORD: api_app_password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: app/migrator/go.sum

      # Creates the "api" database, applies app/api/db/migrations, and --
      # because APP_DB_USER/APP_DB_PASSWORD are set above -- provisions the
      # api_app role with least privilege (CONNECT to "api" only, DML but
      # never DDL on schema public). This is the precondition the
      # "integration"-tagged suite below asserts against.
      - name: Create database + migrate up + provision app role (app/migrator)
        working-directory: ${{ github.workspace }}
        run: |
          go -C app/migrator run ./cmd/migrator \
            -target api -command up \
            -migrations-dir "${{ github.workspace }}/app/api/db/migrations"

      - name: Permission boundary integration tests (build tag "integration")
        run: go test -tags=integration ./...

  # ---------------------------------------------------------------------------
  # api (Go) — `make check` = fmt-check + lint + vet + build + test.
  # golangci-lint is not preinstalled on the runner, so CI installs it (pinned)
  # before invoking `make check`. Contract: .claude/rules/api.md (Makefile).
  # ---------------------------------------------------------------------------
  api:
    name: api (Go)
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # SPEC-005 added github.com/jackc/pgx/v5 as this module's only
          # runtime dependency (previously stdlib-only, no go.sum); cache
          # the module download layer keyed off go.sum.
          cache: true
          cache-dependency-path: app/api/go.sum
      - name: Install golangci-lint
        run: |
          curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/v${GOLANGCI_LINT_VERSION}/install.sh" \
            | sh -s -- -b "$(go env GOPATH)/bin" "v${GOLANGCI_LINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Check (fmt-check + lint + vet + build + test)
        run: make check

  # ---------------------------------------------------------------------------
  # api (Go) — Postgres integration tests (SPEC-005, 2026-07-09 refactor plan
  # §RF.3 RC2). Spins up a pinned postgres service container, then delegates
  # both "create the api database if missing" and "apply app/api/db/migrations"
  # to app/migrator (plan §RF.1.2 — this replaced the old "create schema via
  # psql, then `make migrate-up`" split; there is no separate schema-bootstrap
  # step anymore because api/auth are now separated by dedicated database, not
  # schema/search_path). Runs an up->down->up health check via migrator's
  # `-command`, then the `integration`-tagged suite via app/api's own
  # Makefile. Contract: .claude/rules/db.md + app/migrator's CLI (`-target` /
  # `-command` / `-migrations-dir`, see app/migrator/main.go) + app/api's
  # Makefile (`make test-integration`) — nothing here invents a different
  # command. Re-runs when app/migrator changes too, since this job is exactly
  # where that binary gets exercised against a real Postgres.
  # ---------------------------------------------------------------------------
  api-integration:
    name: api (Postgres integration)
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.migrator == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/api
    services:
      postgres:
        # `services.<id>.image` cannot reference the `env` context (only
        # github/inputs/matrix/needs/strategy/vars are available here) —
        # unlike the `run:` steps below, which do use env.POSTGRES_VERSION.
        # Keep this literal in sync with env.POSTGRES_VERSION above.
        image: postgres:17.5-alpine
        env:
          # POSTGRES_DB only sets this container's own default/maintenance
          # database; it does not need to match app/migrator's
          # DB_MAINTENANCE_NAME below because the postgres image always
          # additionally creates a "postgres" database regardless of this
          # value (see compose.yml, which documents the same fact).
          POSTGRES_DB: app
          POSTGRES_USER: app
          # Disposable credential for this job's ephemeral, throwaway
          # service container only — it never leaves this CI run and has
          # no relation to any real environment. Production DB credentials
          # come from Secrets Manager (see .claude/rules/db.md "セキュリ
          # ティ"); no secret is written here.
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Discrete DB_* settings (SPEC-005 R6), matching app/api/Makefile's own
      # local-dev defaults and this job's postgres service above — not a
      # coincidence, both are meant to describe the same disposable local
      # Postgres. DB_NAME is this stack's own dedicated database (plan
      # §RF.1.1: api/auth are separated by database, not by schema/
      # search_path — there is no DB_SCHEMA anymore). app/migrator and
      # `make test-integration` both read these via the environment
      # (app/api/Makefile's `?=` only applies when the variable is unset).
      # DB_MAINTENANCE_NAME is left unset so app/migrator falls back to its
      # own default ("postgres"), which the service container above always
      # provides.
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_NAME: api
      DB_USER: app
      DB_PASSWORD: app
      DB_SSLMODE: disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          # app/migrator (invoked below via `go -C app/migrator run
          # ./cmd/migrator`) is an independent module with its own go.sum
          # (goose is a library dependency there, unlike app/api's pgx-only
          # go.mod), so both go.sum files are included to key/restore the
          # module cache for everything this job downloads.
          cache-dependency-path: |
            app/api/go.sum
            app/migrator/go.sum

      # Delegates "create the api database if missing" + "apply
      # app/api/db/migrations" to app/migrator (plan §RF.1.2), the same
      # binary the root Makefile's `migrate` target and the prod init
      # container use — so CI, local, and prod all create/migrate through
      # one code path. app/migrator has its own go.mod (RF.1.3: kept out of
      # app/api's go.mod/go.sum), so it is invoked with `go -C` from this
      # step's own working-directory override (this job's default
      # `working-directory: app/api` would otherwise apply) rather than a
      # `make` target — mirrors the root Makefile's `migrate` target
      # exactly (see Makefile's "ローカル Postgres" section).
      - name: Create database + migrate up (app/migrator)
        working-directory: ${{ github.workspace }}
        run: |
          go -C app/migrator run ./cmd/migrator \
            -target api -command up \
            -migrations-dir "${{ github.workspace }}/app/api/db/migrations"

      # Migration health check (R8): prove the down migration is also
      # sound, not just up. Only one migration file exists today
      # (000001_create_tasks.sql), so `-command down` fully unwinds the
      # database before `-command up` reapplies it. The database already
      # exists at this point (created by the step above), so app/migrator's
      # "create if missing" step here is a no-op.
      - name: Migration health check (up -> down -> up)
        working-directory: ${{ github.workspace }}
        run: |
          go -C app/migrator run ./cmd/migrator \
            -target api -command down \
            -migrations-dir "${{ github.workspace }}/app/api/db/migrations"
          go -C app/migrator run ./cmd/migrator \
            -target api -command up \
            -migrations-dir "${{ github.workspace }}/app/api/db/migrations"

      - name: Integration tests (build tag "integration")
        run: make test-integration

  # ---------------------------------------------------------------------------
  # auth (Go) — identical toolchain/flow to api. Contract: .claude/rules/auth.md.
  # ---------------------------------------------------------------------------
  auth:
    name: auth (Go)
    needs: changes
    if: ${{ needs.changes.outputs.auth == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # SPEC-005 added github.com/jackc/pgx/v5 as this module's only
          # runtime dependency (previously stdlib-only, no go.sum); cache
          # the module download layer keyed off go.sum.
          cache: true
          cache-dependency-path: app/auth/go.sum
      - name: Install golangci-lint
        run: |
          curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/v${GOLANGCI_LINT_VERSION}/install.sh" \
            | sh -s -- -b "$(go env GOPATH)/bin" "v${GOLANGCI_LINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Check (fmt-check + lint + vet + build + test)
        run: make check

  # ---------------------------------------------------------------------------
  # auth (Go) — Postgres integration tests (SPEC-005, 2026-07-09 refactor plan
  # §RF.3 RC2). Same shape as api-integration above (delegates database
  # creation + migration to app/migrator), own dedicated database ("auth")
  # and own postgres service container (each job gets its own throwaway
  # container; api and auth never share one, keeping the two stacks
  # independent per project convention). Re-runs when app/migrator changes
  # too, same reasoning as api-integration above.
  # ---------------------------------------------------------------------------
  auth-integration:
    name: auth (Postgres integration)
    needs: changes
    if: ${{ needs.changes.outputs.auth == 'true' || needs.changes.outputs.migrator == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/auth
    services:
      postgres:
        # `services.<id>.image` cannot reference the `env` context (only
        # github/inputs/matrix/needs/strategy/vars are available here) —
        # unlike the `run:` steps below, which do use env.POSTGRES_VERSION.
        # Keep this literal in sync with env.POSTGRES_VERSION above.
        image: postgres:17.5-alpine
        env:
          # See api-integration above: POSTGRES_DB need not match
          # app/migrator's DB_MAINTENANCE_NAME — the postgres image always
          # also creates a "postgres" database.
          POSTGRES_DB: app
          POSTGRES_USER: app
          # See api-integration above: disposable, job-scoped credential
          # only, not a real secret.
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # See api-integration above: DB_NAME is this stack's own dedicated
      # database (plan §RF.1.1), no DB_SCHEMA. DB_MAINTENANCE_NAME left
      # unset so app/migrator defaults to "postgres".
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_NAME: auth
      DB_USER: app
      DB_PASSWORD: app
      DB_SSLMODE: disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          # See api-integration above: both go.sum files key/restore the
          # module cache for everything this job downloads (app/auth's pgx
          # plus app/migrator's goose+pgx).
          cache-dependency-path: |
            app/auth/go.sum
            app/migrator/go.sum

      # See api-integration above: app/migrator (its own go.mod, invoked
      # with `go -C` + a repo-root working-directory override) creates the
      # "auth" database if missing and applies app/auth/db/migrations.
      - name: Create database + migrate up (app/migrator)
        working-directory: ${{ github.workspace }}
        run: |
          go -C app/migrator run ./cmd/migrator \
            -target auth -command up \
            -migrations-dir "${{ github.workspace }}/app/auth/db/migrations"

      # Migration health check (R8): only one migration file exists today
      # (000001_create_auth.sql), so `-command down` fully unwinds the
      # database before `-command up` reapplies it.
      - name: Migration health check (up -> down -> up)
        working-directory: ${{ github.workspace }}
        run: |
          go -C app/migrator run ./cmd/migrator \
            -target auth -command down \
            -migrations-dir "${{ github.workspace }}/app/auth/db/migrations"
          go -C app/migrator run ./cmd/migrator \
            -target auth -command up \
            -migrations-dir "${{ github.workspace }}/app/auth/db/migrations"

      - name: Integration tests (build tag "integration")
        run: make test-integration

  # ---------------------------------------------------------------------------
  # iac (Terraform) — `make check ENV=dev` = fmt-check (root) + validate
  # (init -backend=false) + lint (tflint) + security (trivy). NO apply.
  # CI installs terraform / tflint / trivy (pinned). Contract: .claude/rules/iac.md.
  # ---------------------------------------------------------------------------
  iac:
    name: iac (Terraform)
    needs: changes
    if: ${{ needs.changes.outputs.iac == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/iac
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          # Disable the output-wrapper so `make`/`terraform` exit codes pass
          # through cleanly.
          terraform_wrapper: false
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}
      # Prepare tflint plugins (no-op today: envs/dev has no .tflint.hcl, but
      # this keeps CI working if a plugin config is added later).
      - name: Init tflint
        run: tflint --init
        working-directory: app/iac/envs/dev
      - uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: ${{ env.TRIVY_VERSION }}
      - name: Check (fmt-check + validate + lint + security)
        run: make check ENV=dev
