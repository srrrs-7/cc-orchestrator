# CI pipeline for the cc-orchestrator monorepo.
#
# This workflow runs CI only (format / lint / type check / test / build per
# stack). It intentionally contains NO deploy / CD steps and never runs
# `terraform apply` (see .claude/rules/iac.md).
#
# The commands each job runs are the contract defined in
# .claude/rules/{web,api,auth,iac,testing,db}.md — do not invent commands
# here. Monorepo strategy: a `changes` job detects which stacks changed, and
# each stack job runs only when its paths changed (or on manual dispatch),
# keeping stacks independent.
#
# app/migrator (SPEC-005 2026-07-09 refactor, plan §RF.3 RC2) is its own Go
# module with its own `migrator` job (make check). SPEC-013 (2026-07-11,
# テストの実 DB 一本化) folded what used to be separate api-integration /
# auth-integration jobs directly into the plain `api`/`auth` jobs below:
# those two jobs now invoke app/migrator themselves (root `make
# migrate-test`) to create each stack's own dedicated *test* database
# (`api_test` / `auth_test`) and apply its migrations, then run `make
# check` itself — which is DB-backed by default now (no more separate
# `//go:build integration` lane; see those jobs' own comments).
# migrator-integration (still a separate job, unaffected by SPEC-013)
# additionally exercises app/migrator's own least-privilege runtime role
# provisioning (ISSUE-016 R-c) against a real Postgres instance, using the
# dev-named "api" database as a disposable fixture (not `api_test` — a
# distinct concern from the api/auth jobs' own DB-backed tests below).
#
# SPEC-009 Phase C (2026-07-10): every job below now runs its commands
# inside the single pinned toolchain image (.devcontainer/toolchain/Dockerfile,
# built by ./.github/actions/build-toolchain-image with a GitHub Actions
# cache; see that action's own header for why no job here uses a
# `container:`/GHCR-hosted image — that was a deliberate user decision, not
# an oversight) instead of a runner-installed go/bun/golangci-lint/
# terraform/tflint/trivy. Concretely: `setup-go` / `setup-bun` /
# golangci-lint's curl installer / `setup-terraform` / `setup-tflint` /
# `setup-trivy` are gone from every job; each job instead runs the exact
# (per each stack's own Makefile, all already SPEC-009-Phase-B
# transparent-toolbox wrappers — nothing in *those* files changes here)
# themselves delegate into that same image via `docker compose ... -f
# .devcontainer/compose.tools.yml run --rm tools[-offline] ...`. This is what makes local
# and CI genuinely the same execution environment (SPEC-009 R6), not just
# the same version numbers.
#
# Tool/runtime versions are no longer pinned a second time in this file's
# own `env:` block (pre-SPEC-009, this file was itself the pin source for
# GO_VERSION/BUN_VERSION/GOLANGCI_LINT_VERSION/TERRAFORM_VERSION/
# TFLINT_VERSION/TRIVY_VERSION, later found to have drifted from
# contract-drift.yml's own separate BUN_VERSION pin — see .devcontainer/versions.env's own
# header comment on that history). .devcontainer/versions.env (repo root) is now the only
# place any of these are written; ./.github/actions/build-toolchain-image
# loads it directly. This also removes the drift risk this task set out to
# fix for TRIVY_VERSION specifically (previously pinned here as v0.58.1,
# whose upstream release was deleted — see .devcontainer/versions.env's own TRIVY_VERSION
# comment for the verified detail): rather than re-pinning a second
# `TRIVY_VERSION: v0.69.2` copy in this file that could drift again, trivy
# now only has the one pin, in .devcontainer/versions.env, and this file has nothing left
# to keep in sync.
#
# POSTGRES_VERSION is the one exception still worth a comment: none of this
# file's jobs start a GitHub Actions-native `services:` Postgres container
# anymore (see the api/auth/migrator-integration jobs below) — Postgres
# now comes from the repo's own compose.yml (root `make db-up`),
# which is what keeps its version pinned in sync with .devcontainer/versions.env
# (compose.yml's own header documents that it is a fixed, non-secret
# local/CI-only Postgres). Nothing in this file duplicates that pin either.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs for the same ref (e.g. new push to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect which stacks changed so each stack job can be skipped when untouched.
  # The workflow file itself is added to every filter so CI changes re-run all.
  # SPEC-009 Phase C: the toolchain foundation (.devcontainer/versions.env, .devcontainer/toolchain,
  # .devcontainer/compose.tools.yml, the build-toolchain-image composite action) is now
  # every job's actual execution environment, so a change to any of those
  # also has to re-run every stack's job, not just "the CI workflow file" —
  # added to every category below alongside the pre-existing
  # `.github/workflows/cicd.yml` entry. compose.yml and the root Makefile are
  # added only to the stacks whose jobs actually start Postgres through them
  # (api/auth/migrator — SPEC-013 folded api/auth's own DB provisioning
  # directly into the `api`/`auth` jobs below, formerly separate
  # api-integration/auth-integration jobs; migrator-integration also still
  # starts its own; web/iac never touch either).
  changes:
    name: Detect changed stacks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      auth: ${{ steps.filter.outputs.auth }}
      iac: ${{ steps.filter.outputs.iac }}
      migrator: ${{ steps.filter.outputs.migrator }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # NOTE: this `filters:` value is a literal block-scalar STRING
            # (the whole indented blob below), parsed as its own separate
            # YAML document *by the dorny/paths-filter action itself*, not
            # by the outer workflow YAML parser — so a YAML anchor/alias
            # defined in here would only be resolved by that action's own
            # parser, and (per YAML semantics) `- *anchor` where the
            # anchored node is itself a sequence inserts a NESTED list as
            # one array element rather than flattening its items in place.
            # That is not what a flat glob-pattern list needs, so the
            # toolchain-common paths below are deliberately repeated in
            # full under every category instead of aliased.
            web:
              - 'app/web/**'
              - '.github/workflows/cicd.yml'
              - '.devcontainer/versions.env'
              - '.devcontainer/toolchain/**'
              - '.devcontainer/compose.tools.yml'
              - '.github/actions/build-toolchain-image/**'
            api:
              - 'app/api/**'
              - 'compose.yml'
              - 'Makefile'
              - '.github/workflows/cicd.yml'
              - '.devcontainer/versions.env'
              - '.devcontainer/toolchain/**'
              - '.devcontainer/compose.tools.yml'
              - '.github/actions/build-toolchain-image/**'
            auth:
              - 'app/auth/**'
              - 'compose.yml'
              - 'Makefile'
              - '.github/workflows/cicd.yml'
              - '.devcontainer/versions.env'
              - '.devcontainer/toolchain/**'
              - '.devcontainer/compose.tools.yml'
              - '.github/actions/build-toolchain-image/**'
            iac:
              - 'app/iac/**'
              - '.github/workflows/cicd.yml'
              - '.devcontainer/versions.env'
              - '.devcontainer/toolchain/**'
              - '.devcontainer/compose.tools.yml'
              - '.github/actions/build-toolchain-image/**'
            migrator:
              - 'app/migrator/**'
              - 'compose.yml'
              - 'Makefile'
              - '.github/workflows/cicd.yml'
              - '.devcontainer/versions.env'
              - '.devcontainer/toolchain/**'
              - '.devcontainer/compose.tools.yml'
              - '.github/actions/build-toolchain-image/**'

  # ---------------------------------------------------------------------------
  # web (TypeScript / React) — Bun runtime/pm, Biome, tsc, Vitest, Vite.
  # Contract: .claude/rules/web.md (app/web/Makefile targets).
  #
  # SPEC-009: `app/web/Makefile` transparently delegates every target into
  # the toolchain image (install → tools; check/build/test/… → tools-offline).
  # Host/CI never invokes bun directly.
  # ---------------------------------------------------------------------------
  web:
    name: web (TypeScript / React)
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-toolchain-image

      - name: Install dependencies
        run: make install INSTALL_FLAGS=--frozen-lockfile

      - name: Check (format-check + lint + typecheck + test + build)
        run: make check

  # ---------------------------------------------------------------------------
  # app/migrator (Go) — SPEC-005's shared migration runner (2026-07-09
  # refactor, plan §RF.2.1/§RF.3 RC2). Independent module (its own go.mod),
  # so it gets its own `make check` lane rather than piggybacking on api/auth.
  # `make check` = fmt-check + lint + vet + build + test (app/migrator/Makefile,
  # same target shape as api/auth).
  #
  # SPEC-009 Phase C: `actions/setup-go` and the golangci-lint curl installer
  # are gone (both are baked into the toolchain image); `make check` itself
  # is Phase B's already-existing transparent wrapper into
  # `tools-offline` (network_mode: none). The one step this job still needs
  # of its own is the "Warm Go module cache" one below — `tools-offline`'s
  # named gomodcache volume is empty on a brand-new CI runner (unlike a
  # developer's persistent local volume), and `check`'s fmt-check/lint/vet/
  # build/test-native recipes all run under GOPROXY=off, so this module's
  # own go.sum-declared runtime deps (goose, pgx — see .claude/rules/db.md
  # "goose の閉じ込め") need one prior network-enabled pass to land in that
  # same named volume before the offline `make check` can see them (see
  # .devcontainer/toolchain/Dockerfile's own comment on this two-phase need, which
  # this step exists to satisfy — sqlc/goose(-as-a-CLI)/swag/goimports'
  # OWN module graphs are pre-warmed at image-build time, but this is a
  # different module graph: app/migrator's own go.sum).
  # Contract: .claude/rules/db.md (RF-h: app/migrator is impl-db's).
  # ---------------------------------------------------------------------------
  migrator:
    name: migrator (Go)
    needs: changes
    if: ${{ needs.changes.outputs.migrator == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/migrator
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-toolchain-image

      - name: Warm Go module cache (network-enabled toolbox)
        run: |
          TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g) COMPOSE_PROJECT_NAME=cc-orchestrator TOOLBOX_WORKSPACE="$GITHUB_WORKSPACE" TOOLBOX_CONTEXT="$GITHUB_WORKSPACE/.devcontainer/toolchain" \
          docker compose --env-file "$GITHUB_WORKSPACE/.devcontainer/versions.env" -f "$GITHUB_WORKSPACE/.devcontainer/compose.tools.yml" \
            run --rm -w /workspace/app/migrator tools go mod download

      - name: Check (fmt-check + lint + vet + build + test)
        run: make check

  # ---------------------------------------------------------------------------
  # migrator (Go) — Postgres permission-boundary integration tests (ISSUE-016
  # R-c, review-security Major-1). Provisions the least-privilege runtime
  # role (infra/postgres.RoleEnsurer, plan ISSUE-016-plan.md §1.1's
  # api_app/auth_app convention) via app/migrator's own "up" migration, then
  # runs the `integration`-tagged permission-boundary test suite
  # (app/migrator, impl-db) against it: the scoped role can do DML on its
  # own database, cannot do DDL, and cannot CONNECT to another database.
  #
  # Deliberately separate from the `api`/`auth` jobs below (rather than
  # folding a step into one of them): SPEC-013 folded what used to be
  # separate api-integration/auth-integration jobs directly into `api`/
  # `auth` (their own `make check` is now test-DB-backed by default,
  # against `api_test`/`auth_test`); this job stays standalone because it
  # is about migrator's *own* role-provisioning behavior — this module's
  # test suite (`app/migrator/...`, not app/api's or app/auth's) — so it
  # gets its own throwaway Postgres and does not touch those jobs. It
  # reuses the dev-named "api" target/database (never `api_test`) purely
  # as a fixture to get a real migrated database to provision a role
  # against; it is not testing app/api's persistence layer.
  #
  # SPEC-009 Phase C: Postgres is now the repo's own compose.yml `postgres`
  # service (root `make db-up`), started in the SAME docker compose project
  # as the toolchain containers below, rather than a GitHub Actions-native
  # `services:` container — the latter publishes its port only to the
  # runner's own 127.0.0.1, which a *separate* toolbox container (a sibling
  # container, not the job's own process) cannot reach without extra network
  # plumbing (host.docker.internal / --network host), whereas layering
  # `-f compose.yml -f .devcontainer/compose.tools.yml` (exactly what app/migrator's own
  # `make run`/`make test-integration` already do locally, per that
  # Makefile's own ONLINE_DB/DB_COMPOSE comments) lets these containers
  # resolve `postgres` by its compose service name, giving CI the identical
  # network shape a developer's own `make db-up && make -C app/migrator
  # run ...` has locally (SPEC-009 R6 "ローカル = CI").
  #
  # This job invokes `docker compose run` directly (rather than through
  # app/migrator/Makefile's `run`/`test-integration` targets) because it
  # needs to forward two extra environment variables — APP_DB_USER /
  # APP_DB_PASSWORD — that those targets' own DB_ONLINE_ENV does not expose
  # (by design: that fixed set covers only the master-credential connection
  # every OTHER caller of those targets needs). This is additive plumbing
  # only: the actual command run inside the container on each step below
  # (`go run ./cmd/migrator ...` / `go test -tags=integration ./...`) is
  # exactly app/migrator's own CLI contract (.claude/rules/db.md) — nothing
  # here invents a different command.
  #
  # Contract: .claude/rules/db.md (ISSUE-016 R-c) + app/migrator's CLI
  # (`-target`/`-command`/`-migrations-dir`, see app/migrator/cmd/migrator/
  # main.go) + env.go's APP_DB_USER/APP_DB_PASSWORD contract.
  # ---------------------------------------------------------------------------
  migrator-integration:
    name: migrator (Postgres permission boundary integration)
    needs: changes
    if: ${{ needs.changes.outputs.migrator == 'true' || needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Names the least-privilege runtime role (ISSUE-016 R-c naming
      # convention, app/iac/modules/db/variables.tf's api_app_role_name
      # default) this job's "up" migration provisions via
      # infra/postgres.RoleEnsurer — the role the permission-boundary
      # test suite below connects as. Disposable, job-scoped value only
      # (same rationale as compose.yml's own local-only Postgres
      # credentials), not a real secret.
      APP_DB_USER: api_app
      APP_DB_PASSWORD: api_app_password
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-toolchain-image

      - name: Start Postgres (root make db-up)
        run: make db-up

      # Creates the "api" database, applies app/api/infra/postgres/schema/migrations, and --
      # because APP_DB_USER/APP_DB_PASSWORD are set above and forwarded
      # below (`-e APP_DB_USER` / `-e APP_DB_PASSWORD` with no `=value`
      # forwards each from this step's own process environment, i.e. this
      # job's `env:` block above — the same bare-name passthrough `docker
      # run`/`docker compose run` both document) -- provisions the api_app
      # role with least privilege (CONNECT to "api" only, DML but never DDL
      # on schema public). This is the precondition the "integration"-tagged
      # suite below asserts against.
      - name: Create database + migrate up + provision app role (app/migrator)
        run: |
          TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g) COMPOSE_PROJECT_NAME=cc-orchestrator TOOLBOX_WORKSPACE="$GITHUB_WORKSPACE" TOOLBOX_CONTEXT="$GITHUB_WORKSPACE/.devcontainer/toolchain" \
          docker compose --env-file "$GITHUB_WORKSPACE/.devcontainer/versions.env" \
            -f "$GITHUB_WORKSPACE/compose.yml" -f "$GITHUB_WORKSPACE/.devcontainer/compose.tools.yml" \
            run --rm -w /workspace/app/migrator \
            -e DB_HOST=postgres -e DB_PORT=5432 -e DB_NAME=api -e DB_USER=app -e DB_PASSWORD=app -e DB_SSLMODE=disable \
            -e APP_DB_USER -e APP_DB_PASSWORD \
            tools go run ./cmd/migrator -target api -command up -migrations-dir /workspace/app/api/infra/postgres/schema/migrations

      - name: Permission boundary integration tests (build tag "integration")
        run: |
          TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g) COMPOSE_PROJECT_NAME=cc-orchestrator TOOLBOX_WORKSPACE="$GITHUB_WORKSPACE" TOOLBOX_CONTEXT="$GITHUB_WORKSPACE/.devcontainer/toolchain" \
          docker compose --env-file "$GITHUB_WORKSPACE/.devcontainer/versions.env" \
            -f "$GITHUB_WORKSPACE/compose.yml" -f "$GITHUB_WORKSPACE/.devcontainer/compose.tools.yml" \
            run --rm -w /workspace/app/migrator \
            -e DB_HOST=postgres -e DB_PORT=5432 -e DB_NAME=api -e DB_USER=app -e DB_PASSWORD=app -e DB_SSLMODE=disable \
            -e APP_DB_USER -e APP_DB_PASSWORD \
            tools go test -tags=integration ./...

  # ---------------------------------------------------------------------------
  # api (Go) — `make check` = fmt-check + lint + vet + build + test.
  # Contract: .claude/rules/api.md (Makefile).
  #
  # SPEC-013 (2026-07-11, テストの実 DB 一本化): the former `api-integration`
  # job (a separate `//go:build integration` lane, GitHub-Actions-only) is
  # gone — app/api's own `make check`/`make test` now connect to a real
  # Postgres *test* database (`api_test`, never the dev-named `api`
  # database) by default (plan §1.1/§1.4: the `//go:build integration` tag
  # itself is removed from app/api entirely). This job therefore provisions
  # that test database itself, the way api-integration used to provision
  # the dev database: root `make db-up` (starts the repo's own compose.yml
  # Postgres), then root `make migrate-test` (app/migrator, creates+
  # migrates BOTH `api_test` and `auth_test` — see that target's own
  # comment in the root Makefile; harmless/idempotent for this job to also
  # touch `auth_test`, mirroring how `up`/`up-d`'s `migrate` prerequisite
  # already provisions both stacks' dev databases regardless of which one
  # a developer is working on), then a migration health check (down -> up)
  # scoped to `api_test` specifically (mirroring api-integration's own
  # up->down->up check, just against the test database instead of the dev
  # one), then `make check` itself with `REQUIRE_DB=1` (SPEC-013 plan §1.5
  # admin ruling: the regular CI/hook path for DB-backed tests must fail
  # loudly — `t.Fatal`, not a silent `t.Skip` — if the test DB connection
  # is ever unavailable through this path).
  #
  # The health-check step below invokes `docker compose run` directly
  # (bypassing app/migrator/Makefile's own `run` target, which has no
  # DB_NAME override) for the same reason the root Makefile's own
  # `migrate`/`migrate-test` targets do — see those targets' own comments.
  #
  # SPEC-009 Phase C: the toolchain-image wiring (warm pass + `make check`)
  # is unchanged from before SPEC-013; only the DB-provisioning steps below
  # are new.
  # ---------------------------------------------------------------------------
  api:
    name: api (Go)
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.migrator == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/api
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-toolchain-image

      - name: Warm Go module cache (network-enabled toolbox)
        run: |
          TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g) COMPOSE_PROJECT_NAME=cc-orchestrator TOOLBOX_WORKSPACE="$GITHUB_WORKSPACE" TOOLBOX_CONTEXT="$GITHUB_WORKSPACE/.devcontainer/toolchain" \
          docker compose --env-file "$GITHUB_WORKSPACE/.devcontainer/versions.env" -f "$GITHUB_WORKSPACE/.devcontainer/compose.tools.yml" \
            run --rm -w /workspace/app/api tools go mod download

      # ISSUE-028 §4 現象3 fix: run offline checks (fmt-check + lint + vet +
      # build) BEFORE Postgres is provisioned. A format / lint / vet / build
      # failure exits immediately without paying the db-up + migrate-test cost
      # — restoring the fail-fast that was lost when SPEC-013 folded DB
      # provisioning into this job. Each host-side target delegates into
      # tools-offline (network_mode:none) via the app/api/Makefile wrapper.
      - name: Offline check (fmt-check + lint + vet + build)
        run: make fmt-check lint vet build

      # `make -C "$GITHUB_WORKSPACE" ...` (rather than relying on this
      # job's own `defaults.run.working-directory: app/api`) because
      # `db-up`/`migrate-test` are root Makefile targets, not app/api's.
      - name: Start Postgres (root make db-up)
        run: make -C "$GITHUB_WORKSPACE" db-up

      - name: Create test databases + migrate up (app/migrator, api_test/auth_test)
        run: make -C "$GITHUB_WORKSPACE" migrate-test

      - name: Migration health check for api_test (down -> up)
        run: |
          TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g) COMPOSE_PROJECT_NAME=cc-orchestrator TOOLBOX_WORKSPACE="$GITHUB_WORKSPACE" TOOLBOX_CONTEXT="$GITHUB_WORKSPACE/.devcontainer/toolchain" \
          docker compose --env-file "$GITHUB_WORKSPACE/.devcontainer/versions.env" \
            -f "$GITHUB_WORKSPACE/compose.yml" -f "$GITHUB_WORKSPACE/.devcontainer/compose.tools.yml" \
            run --rm -w /workspace/app/migrator \
            -e DB_HOST=postgres -e DB_PORT=5432 -e DB_NAME=api_test -e DB_USER=app -e DB_PASSWORD=app -e DB_SSLMODE=disable \
            tools go run ./cmd/migrator -target api -command down -migrations-dir /workspace/app/api/infra/postgres/schema/migrations
          TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g) COMPOSE_PROJECT_NAME=cc-orchestrator TOOLBOX_WORKSPACE="$GITHUB_WORKSPACE" TOOLBOX_CONTEXT="$GITHUB_WORKSPACE/.devcontainer/toolchain" \
          docker compose --env-file "$GITHUB_WORKSPACE/.devcontainer/versions.env" \
            -f "$GITHUB_WORKSPACE/compose.yml" -f "$GITHUB_WORKSPACE/.devcontainer/compose.tools.yml" \
            run --rm -w /workspace/app/migrator \
            -e DB_HOST=postgres -e DB_PORT=5432 -e DB_NAME=api_test -e DB_USER=app -e DB_PASSWORD=app -e DB_SSLMODE=disable \
            tools go run ./cmd/migrator -target api -command up -migrations-dir /workspace/app/api/infra/postgres/schema/migrations

      # REQUIRE_DB=1 (SPEC-013 plan §1.5 admin ruling): the正規経路 for
      # DB-backed tests must fail loudly (t.Fatal), never silently t.Skip,
      # if the api_test connection is ever unavailable here.
      # Offline checks (fmt-check + lint + vet + build) already ran in the
      # "Offline check" step above; this step runs only the DB-backed tests
      # (ISSUE-028 §4 現象3 fix: DB provisioning is now post-offline-check).
      - name: DB tests (test-native; api_test-backed; REQUIRE_DB=1)
        env:
          REQUIRE_DB: "1"
        run: make test

  # ---------------------------------------------------------------------------
  # auth (Go) — identical toolchain/flow to api (including SPEC-013's
  # test-DB provisioning below). Contract: .claude/rules/auth.md.
  # ---------------------------------------------------------------------------
  auth:
    name: auth (Go)
    needs: changes
    if: ${{ needs.changes.outputs.auth == 'true' || needs.changes.outputs.migrator == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/auth
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-toolchain-image

      - name: Warm Go module cache (network-enabled toolbox)
        run: |
          TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g) COMPOSE_PROJECT_NAME=cc-orchestrator TOOLBOX_WORKSPACE="$GITHUB_WORKSPACE" TOOLBOX_CONTEXT="$GITHUB_WORKSPACE/.devcontainer/toolchain" \
          docker compose --env-file "$GITHUB_WORKSPACE/.devcontainer/versions.env" -f "$GITHUB_WORKSPACE/.devcontainer/compose.tools.yml" \
            run --rm -w /workspace/app/auth tools go mod download

      # ISSUE-028 §4 現象3 fix: same offline-first ordering as the api job
      # above — fmt-check + lint + vet + build run before any Postgres
      # provisioning so a static-analysis failure exits without paying the
      # db-up + migrate-test cost.
      - name: Offline check (fmt-check + lint + vet + build)
        run: make fmt-check lint vet build

      - name: Start Postgres (root make db-up)
        run: make -C "$GITHUB_WORKSPACE" db-up

      - name: Create test databases + migrate up (app/migrator, api_test/auth_test)
        run: make -C "$GITHUB_WORKSPACE" migrate-test

      - name: Migration health check for auth_test (down -> up)
        run: |
          TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g) COMPOSE_PROJECT_NAME=cc-orchestrator TOOLBOX_WORKSPACE="$GITHUB_WORKSPACE" TOOLBOX_CONTEXT="$GITHUB_WORKSPACE/.devcontainer/toolchain" \
          docker compose --env-file "$GITHUB_WORKSPACE/.devcontainer/versions.env" \
            -f "$GITHUB_WORKSPACE/compose.yml" -f "$GITHUB_WORKSPACE/.devcontainer/compose.tools.yml" \
            run --rm -w /workspace/app/migrator \
            -e DB_HOST=postgres -e DB_PORT=5432 -e DB_NAME=auth_test -e DB_USER=app -e DB_PASSWORD=app -e DB_SSLMODE=disable \
            tools go run ./cmd/migrator -target auth -command down -migrations-dir /workspace/app/auth/infra/postgres/schema/migrations
          TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g) COMPOSE_PROJECT_NAME=cc-orchestrator TOOLBOX_WORKSPACE="$GITHUB_WORKSPACE" TOOLBOX_CONTEXT="$GITHUB_WORKSPACE/.devcontainer/toolchain" \
          docker compose --env-file "$GITHUB_WORKSPACE/.devcontainer/versions.env" \
            -f "$GITHUB_WORKSPACE/compose.yml" -f "$GITHUB_WORKSPACE/.devcontainer/compose.tools.yml" \
            run --rm -w /workspace/app/migrator \
            -e DB_HOST=postgres -e DB_PORT=5432 -e DB_NAME=auth_test -e DB_USER=app -e DB_PASSWORD=app -e DB_SSLMODE=disable \
            tools go run ./cmd/migrator -target auth -command up -migrations-dir /workspace/app/auth/infra/postgres/schema/migrations

      # Offline checks already ran above; only DB-backed tests run here
      # (ISSUE-028 §4 現象3 fix, mirroring the api job's split).
      - name: DB tests (test-native; auth_test-backed; REQUIRE_DB=1)
        env:
          REQUIRE_DB: "1"
        run: make test

  # ---------------------------------------------------------------------------
  # iac (Terraform) — `make check ENV=dev` = fmt-check (root) + validate
  # (init -backend=false) + lint (tflint) + security (trivy). NO apply.
  # Contract: .claude/rules/iac.md.
  #
  # SPEC-009 Phase C: `hashicorp/setup-terraform` / `terraform-linters/
  # setup-tflint` / `aquasecurity/setup-trivy` and the separate `tflint
  # --init` step are all gone — terraform/tflint/trivy are baked into the
  # toolchain image, and `make check ENV=dev` (app/iac/Makefile, Phase B) is
  # already a transparent wrapper that runs each of fmt-check/validate/lint/
  # security in whichever of the toolbox's two services (network-enabled
  # `tools` for validate's provider fetch, `tools-offline` for the other
  # three) that Makefile's own header comment documents needing — nothing
  # new for this job to orchestrate itself.
  # ---------------------------------------------------------------------------
  iac:
    name: iac (Terraform)
    needs: changes
    if: ${{ needs.changes.outputs.iac == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/iac
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-toolchain-image

      - name: Check (fmt-check + validate + lint + security)
        run: make check ENV=dev
