# OpenAPI contract drift check for SPEC-003 (Go <-> TypeScript type sharing).
#
# This is the ONLY job in the repo that needs BOTH the Go and Bun toolchains
# in the same job: it regenerates app/api's OpenAPI contract from the Go
# swag v2 annotations, then regenerates app/web's generated types / Zod
# schemas / TanStack Query client from that contract, and fails if either
# regenerated artifact differs from what's committed (i.e. "Go's DTOs
# changed but the generated contract/TS wasn't re-committed").
#
# Kept as a dedicated workflow file (not folded into .github/workflows/cicd.yml)
# per docs/plans/SPEC-003-plan.md ("唯一 Go+Bun 双方を要する跨り stack ジョブ
# として隔離" — the NFR "avoid cross-stack tooling per job" is intentionally
# broken only here, isolated into its own file/job with this comment as the
# rationale). The commands run here are exactly the contract defined in
# .claude/rules/api.md (`make openapi`) and .claude/rules/web.md
# (`bun run generate`) — do not invent commands here.
#
# SPEC-009 Phase C (2026-07-10): this job now runs both commands inside the
# single pinned toolchain image (.devcontainer/toolchain/Dockerfile, built by
# ./.github/actions/build-toolchain-image) instead of `actions/setup-go` +
# `oven-sh/setup-bun`. This is also where SPEC-009's .devcontainer/versions.env
# consolidation resolves this file's own historical BUN_VERSION split from
# cicd.yml (this file used to deliberately pin bun 1.3.14 while cicd.yml
# pinned 1.2.21 — see .devcontainer/versions.env's own header comment for that history):
# both files now load the exact same .devcontainer/versions.env, so there is only one bun
# version pinned anywhere in this repo's CI/toolchain.
name: OpenAPI Contract Drift

on:
  push:
    branches: [main]
    paths:
      - "app/api/**"
      - "app/web/**"
      - ".devcontainer/versions.env"
      - ".devcontainer/toolchain/**"
      - ".devcontainer/compose.tools.yml"
      - ".github/actions/build-toolchain-image/**"
      - ".github/workflows/contract-drift.yml"
  pull_request:
    paths:
      - "app/api/**"
      - "app/web/**"
      - ".devcontainer/versions.env"
      - ".devcontainer/toolchain/**"
      - ".devcontainer/compose.tools.yml"
      - ".github/actions/build-toolchain-image/**"
      - ".github/workflows/contract-drift.yml"
  workflow_dispatch:

# Cancel superseded runs for the same ref (e.g. new push to a PR branch).
# Group name is scoped to this workflow's name so it never collides with
# cicd.yml's own concurrency group.
concurrency:
  group: contract-drift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contract-drift:
    name: Contract drift (api openapi.yaml <-> web generated)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-toolchain-image

      # `make openapi` (app/api/Makefile) runs under `tools-offline`
      # (network_mode: none) like every other app/api Makefile target — see
      # cicd.yml's `api`/`migrator` job comments for why this stack's own
      # go.sum-declared runtime deps (pgx) need one network-enabled warm
      # pass into the shared gomodcache volume first, on a brand-new CI
      # runner with no persisted local volume.
      - name: Warm Go module cache (app/api)
        run: |
          TOOLBOX_UID=$(id -u) TOOLBOX_GID=$(id -g) COMPOSE_PROJECT_NAME=cc-orchestrator TOOLBOX_WORKSPACE="$GITHUB_WORKSPACE" TOOLBOX_CONTEXT="$GITHUB_WORKSPACE/.devcontainer/toolchain" \
          docker compose --env-file "$GITHUB_WORKSPACE/.devcontainer/versions.env" -f "$GITHUB_WORKSPACE/.devcontainer/compose.tools.yml" \
            run --rm -w /workspace/app/api tools go mod download

      # Regenerates app/api/docs/openapi.yaml from the swag v2 annotations
      # (`make openapi` = swag init, pinned via .devcontainer/versions.env's SWAG_VERSION,
      # baked into the toolchain image — see app/api/Makefile). Contract:
      # .claude/rules/api.md.
      - name: Regenerate OpenAPI contract (app/api)
        working-directory: app/api
        run: make openapi

      # app/web/Makefile (SPEC-009): install → tools (network); generate →
      # tools-offline. Host/CI never invokes bun directly.
      - name: Install web dependencies
        working-directory: app/web
        run: make install INSTALL_FLAGS=--frozen-lockfile

      # Regenerates types + Zod + TanStack Query client from the OpenAPI
      # contract produced above (openapi-ts.config.ts input =
      # ../api/docs/openapi.yaml). Contract: .claude/rules/web.md.
      - name: Regenerate types/Zod/query client (app/web)
        working-directory: app/web
        run: make generate

      # SPEC-003 R6: fail if regenerating either artifact produced a diff,
      # i.e. someone changed the Go DTOs/annotations or the OpenAPI contract
      # without re-running `make openapi` / `make -C app/web generate` and
      # committing the result. This must also catch the case where
      # regeneration produces a brand-new file that was never committed
      # (e.g. a future @hey-api/openapi-ts version/plugin change emitting an
      # additional generated file) — plain `git diff --exit-code` is blind
      # to untracked paths, so it would silently pass that case.
      #
      # This step runs directly on the runner (not inside the toolbox) —
      # both regeneration steps above wrote their output through the same
      # bind-mounted /workspace this checkout already is, owned by this
      # runner's own uid:gid (.devcontainer/compose.tools.yml's `user:` override, driven
      # by the TOOLBOX_UID/TOOLBOX_GID each Makefile target
      # invocation above computes via `id -u`/`id -g` automatically), so a
      # plain host-side `git diff` sees the exact same files with no
      # permission mismatch.
      - name: Fail on contract drift
        run: |
          # `git add -N` (--intent-to-add) registers any currently
          # untracked paths under the watched locations in the index
          # (without staging their content), so `git diff` below reports
          # them as additions instead of ignoring them. Already-tracked,
          # unmodified files are unaffected.
          git add -N -- \
            app/api/docs/openapi.yaml \
            app/web/src/features/tasks/api/generated

          if ! git diff --exit-code -- \
            app/api/docs/openapi.yaml \
            app/web/src/features/tasks/api/generated; then
            echo
            echo "::error::Contract drift detected — the diff above (new/changed files marked '+') was produced by regenerating app/api/docs/openapi.yaml and app/web's generated client from source. Run 'make openapi' in app/api and 'make -C app/web generate' locally, then commit the result."
            echo
            echo "----- git status (watched paths) -----"
            git status -- \
              app/api/docs/openapi.yaml \
              app/web/src/features/tasks/api/generated
            exit 1
          fi
