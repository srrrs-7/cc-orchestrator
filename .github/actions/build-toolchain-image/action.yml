# .github/actions/build-toolchain-image/action.yml
#
# SPEC-009 Phase C: shared "build the pinned toolchain image" step, used by
# every job in .github/workflows/{cicd,contract-drift,sqlc-drift}.yml that
# needs to run a `make <target>` (api/auth/migrator/iac Makefiles) or
# `bun run <script>` (app/web, via bin/bun) command.
#
# User decision (2026-07-10, SPEC-009 Phase C kickoff): CI builds and caches
# the toolchain image itself in every job -- it does NOT push to GHCR and no
# job runs as a `container:` job. This composite action is the single place
# that build step lives, so all callers share one implementation instead of
# ~11 near-identical copies of the same docker/build-push-action step drifting
# apart over time.
#
# What this buys each caller: after this action runs, `cc-orchestrator/toolchain:local`
# -- the exact image tag compose.tools.yml's `tools`/`tools-offline` services
# reference via their shared `x-tools-base` anchor's `image:` field -- is
# already present in the runner's local Docker daemon. Every subsequent
# `docker compose ... run --rm tools[-offline] ...` in the same job (which is
# all that any stack's Makefile wrapper, or app/web's bin/bun shim, ever does
# once invoked on the host/CI side -- see docs/plans/SPEC-009-plan.md
# "Makefile 透過ラッパーの形" / "web の透過ラッパー") finds this image already
# built and does not rebuild it, so callers can simply run `make check` /
# `bun run test` / etc. exactly as documented in each stack's own rules file,
# with no toolchain-specific plumbing of their own.
name: Build toolchain image
description: >-
  Builds docker/toolchain (SPEC-009's single pinned polyglot toolchain image)
  from versions.env, using a GitHub Actions cache (buildx cache-from/to: gha)
  so repeat CI runs reuse layers instead of reinstalling every tool from
  scratch, and loads the result into the runner's local Docker daemon as
  cc-orchestrator/toolchain:local.

runs:
  using: composite
  steps:
    # The default buildx driver bundled with Docker Engine on GitHub-hosted
    # runners cannot talk to the GitHub Actions Cache API (the `type=gha`
    # cache backend needs BuildKit running as its own container, i.e. the
    # `docker-container` driver) -- this step switches to that driver so the
    # cache-from/cache-to below actually take effect instead of silently
    # building without any cache.
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # versions.env (repo root, SPEC-009's single source of truth -- see that
    # file's own header comment) is the ONLY place these tool versions are
    # pinned. Loading it into $GITHUB_ENV here -- rather than hardcoding a
    # second copy of these same values in this action or in any calling
    # workflow's own `env:` block, as every workflow did before SPEC-009 --
    # is what keeps CI and a developer's local `docker compose ... build`
    # from drifting apart (docs/plans/SPEC-009-plan.md's "versions.env の設計"
    # note: this one file is meant to be readable by a shell, GitHub Actions,
    # docker compose, and make alike).
    - name: Load versions.env
      shell: bash
      run: cat "${{ github.workspace }}/versions.env" >> "$GITHUB_ENV"

    # Build-arg list mirrors compose.tools.yml's `x-tools-base.build.args`
    # exactly (same 10 keys, same versions.env source that anchor itself
    # reads via `${VAR}` compose substitution) -- keep both lists in sync if
    # either changes. POSTGRES_VERSION is deliberately excluded: it pins the
    # Postgres *service* image compose.yml / this repo's CI jobs start, not a
    # docker/toolchain/Dockerfile build ARG (the Dockerfile has no such ARG).
    #
    # provenance: false -- docker/build-push-action@v6 defaults to emitting a
    # build provenance attestation, which forces a multi-manifest image index
    # output that `load: true` cannot import into a plain local Docker
    # daemon (the load step fails/only loads a manifest list, not a runnable
    # image) for a single-platform build like this one. Disabling it keeps
    # the output a single, directly runnable image, which is all a locally
    # `docker compose run`-invoked image ever needs.
    - name: "Build (cache-from/to: gha)"
      uses: docker/build-push-action@v6
      with:
        context: ${{ github.workspace }}/docker/toolchain
        tags: cc-orchestrator/toolchain:local
        load: true
        provenance: false
        cache-from: type=gha,scope=toolchain
        cache-to: type=gha,mode=max,scope=toolchain
        build-args: |
          GO_VERSION=${{ env.GO_VERSION }}
          BUN_VERSION=${{ env.BUN_VERSION }}
          GOLANGCI_LINT_VERSION=${{ env.GOLANGCI_LINT_VERSION }}
          TERRAFORM_VERSION=${{ env.TERRAFORM_VERSION }}
          TFLINT_VERSION=${{ env.TFLINT_VERSION }}
          TRIVY_VERSION=${{ env.TRIVY_VERSION }}
          SQLC_VERSION=${{ env.SQLC_VERSION }}
          GOOSE_VERSION=${{ env.GOOSE_VERSION }}
          SWAG_VERSION=${{ env.SWAG_VERSION }}
          GOIMPORTS_VERSION=${{ env.GOIMPORTS_VERSION }}
